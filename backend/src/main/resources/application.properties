spring.application.name=backend

# ── Server ──
server.port=8080

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5434/doaniotdb
spring.datasource.username=doaniotuser
spring.datasource.password=doaniotpass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection Pool (HikariCP) ──
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.open-in-view=false

# ── Jackson (prevent lazy-loading errors in JSON) ──
spring.jackson.serialization.fail-on-empty-beans=false

# ── Redis Cache ──
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.cache.redis.time-to-live=300000

# ── MQTT (custom properties read via @Value) ──
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=doaniot-backend
