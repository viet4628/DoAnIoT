spring.application.name=backend

# ── Server ──
server.port=8080

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5434/doaniotdb
spring.datasource.username=doaniotuser
spring.datasource.password=doaniotpass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Jackson (prevent lazy-loading errors in JSON) ──
spring.jackson.serialization.fail-on-empty-beans=false

# ── MQTT (custom properties read via @Value) ──
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=doaniot-backend
