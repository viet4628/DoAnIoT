worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Cấu hình log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Upstream for web app
    upstream webapp {
        server webapp:80;
    }

    # Upstream for backend API
    upstream backend_api {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _; # Nhận mọi request đến IP

        # 1. Reverse Proxy cho Spring Boot API
        location /api/ {
            proxy_pass http://backend_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 2. Reverse Proxy cho Trang quản trị EMQX Dashboard
        location /emqx/ {
            proxy_pass http://emqx:18083/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Serve React Web App
        location / {
            proxy_pass http://webapp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Có thể thêm config SSL (HTTPS) tại đây bằng certbot sau này
    }
}
